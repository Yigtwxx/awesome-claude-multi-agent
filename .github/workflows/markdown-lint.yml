name: Markdown Lint

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  markdownlint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npx markdownlint-cli2 --config ./.github/.markdownlint-cli2.jsonc "**/*.md" "#node_modules"
